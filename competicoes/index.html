<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Competições | PRS Portugal</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png" />
    <script>
      (function () {
        try {
          const saved = localStorage.getItem("prs-theme");
          const theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {}
      })();
    </script>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script src="../config/site.config.js"></script>
    <link rel="preconnect" href="https://docs.google.com" />
  </head>
  <body data-base=".." data-page="competicoes">
    <div id="site-header"></div>

    <main>
  <!-- HERO -->
  <section class="page-hero">
    <div class="container">
      <p class="kicker">Calendário</p>
      <h1 class="page-title">Competições PRS Portugal</h1>
      <p class="lead">Lista oficial de todas as competições futuras.</p>
    </div>
  </section>

  <!-- PROXIMA COMPETIÇÃO -->
  <section class="section container">
    <div class="section-head">
      <h2>Próxima competição</h2>
    </div>

    <div id="next-event-highlight" class="next-event-card">
      <p class="muted">A carregar próxima prova...</p>
    </div>
  </section>

  <!-- CALENDÁRIO (igual ao teu) -->
  <section class="section alt">
    <div class="container">
      <div class="section-head">
        <h2>Calendário completo</h2>
        <p class="muted">Atualizado com as próximas provas publicadas.</p>
      </div>

      <div id="events-grid" class="events-grid" aria-live="polite"></div>

      <p id="events-empty" class="muted" hidden>
        Sem competições publicadas de momento.
      </p>
    </div>
  </section>
</main>

    <div id="site-footer"></div>

    <script type="module" src="../assets/js/competicoes.page.js"></script>
  </body>
</html>
