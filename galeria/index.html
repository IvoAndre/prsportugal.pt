<!doctype html>
<html lang="pt-PT">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria | PRS Portugal</title>
  <link rel="icon" type="image/png" href="../assets/images/favicon.png" />
  <script>
    (function () {
      try {
        const saved = localStorage.getItem("prs-theme");
        const theme =
          saved === "light" || saved === "dark"
            ? saved
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", theme);
      } catch (_) { }
    })();
  </script>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <script src="../config/site.config.js"></script>
</head>

<body data-base=".." data-page="galeria">
  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="kicker">Galeria</p>
        <h1 class="page-title">Competições e fotografias</h1>
        <p class="lead">Explora as galerias de cada competição PRS Portugal.</p>
      </div>
    </section>

    <section class="section container">
      <div id="gallery-list" class="gallery-list" aria-live="polite"></div>
      <p id="gallery-empty" class="muted" hidden>Sem galerias disponíveis de momento.</p>
    </section>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="../assets/js/gallery.page.js"></script>
</body>

</html>
